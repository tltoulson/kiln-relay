services:
  kiln-relay:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    volumes:
      # Mounts the log directory so logs persist outside the container.
      # LOG_FILE in .env should be /logs/kiln.log when running in Docker.
      - ./logs:/logs
