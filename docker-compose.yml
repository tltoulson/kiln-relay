services:
  kiln-relay:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-80}:${PORT:-80}"
    env_file:
      - .env
    volumes:
      # Mounts the log directory so logs persist outside the container.
      # LOG_DIR in .env controls the host path; /logs is the container-side mount point.
      - ${LOG_DIR:-./logs}:/logs
